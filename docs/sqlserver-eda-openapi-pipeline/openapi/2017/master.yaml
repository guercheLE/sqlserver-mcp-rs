  securitySchemes:
    sqlAuth:
      type: http
      scheme: basic
      description: 'SQL Server Authentication: a SQL login (username + password) validated by the engine
        itself, e.g. `sqlcmd -U sa -P <password>`. Available in every version, but only usable when the
        instance is configured for Mixed Mode (SQL Server and Windows Authentication); Windows-Authentication-only
        instances reject it.'
    windowsAuth:
      type: http
      scheme: negotiate
      description: 'Windows Authentication (Integrated Security): the client''s Windows/Kerberos or NTLM
        identity is passed through instead of a SQL login, e.g. `sqlcmd -E`. Available in every version;
        on Linux containers this requires the container to be configured for Kerberos (keytab + krb5.conf)
        since there is no NTLM/domain-join support otherwise.'
security:
- sqlAuth: []
- windowsAuth: []
