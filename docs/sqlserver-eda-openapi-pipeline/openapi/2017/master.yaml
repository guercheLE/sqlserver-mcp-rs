components:
  schemas:
    SqlServerError:
      type: object
      description: Shape of a SQL Server engine error as surfaced on the TDS connection (the fields available
        from THROW / RAISERROR / ERROR_NUMBER() / ERROR_SEVERITY() / ERROR_STATE() / ERROR_PROCEDURE()
        / ERROR_LINE() / ERROR_MESSAGE(), or a client driver's exception object).
      properties:
        number:
          type: integer
          x-sql-type: int
          description: ERROR_NUMBER() -- e.g. 50000 for a user RAISERROR/THROW with no explicit error
            number.
        severity:
          type: integer
          x-sql-type: int
          description: ERROR_SEVERITY() -- see the severity-to-status mapping on each operation's error
            responses.
        state:
          type: integer
          x-sql-type: int
          description: ERROR_STATE() -- caller-defined, used to distinguish multiple raise points of the
            same error number.
        procedure:
          type:
          - string
          - 'null'
          x-sql-type: nvarchar(128)
          description: ERROR_PROCEDURE() -- null if the error was raised in a batch, not inside a procedure.
        line:
          type:
          - integer
          - 'null'
          x-sql-type: int
          description: ERROR_LINE()
        message:
          type: string
          x-sql-type: nvarchar(2048)
          description: ERROR_MESSAGE()
      required:
      - number
      - severity
      - state
      - message
