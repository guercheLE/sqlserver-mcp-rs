# Curated set of SQL Server built-in objects to document.
# Each entry is a name (schema.name) or a name pattern (SQL LIKE syntax, matched
# against sys.all_objects.name / sys.system_objects.name). Patterns keep the
# list short while still covering whole families (e.g. all sys.dm_exec_* DMVs).
# This file is version-agnostic; the EDA scripts join it against each running
# instance's actual catalog, so objects that don't exist in a given version are
# simply absent from that version's output (that absence is itself signal —
# see version_diff.sql).

categories:
  admin_procs:
    description: Commonly used administrative/system stored procedures
    databases: [master, msdb]
    names:
      - sp_who
      - sp_who2
      - sp_help
      - sp_helpdb
      - sp_helptext
      - sp_helpindex
      - sp_helpconstraint
      - sp_columns
      - sp_tables
      - sp_stored_procedures
      - sp_databases
      - sp_server_info
      - sp_configure
      - sp_rename
      - sp_executesql
      - sp_execute
      - sp_prepare
      - sp_unprepare
      - sp_addlinkedserver
      - sp_droplinkedserver
      - sp_linkedservers
      - sp_addrole
      - sp_addrolemember
      - sp_addlogin
      - sp_grantdbaccess
      - sp_depends
      - sp_lock
      - sp_monitor
      - sp_spaceused
      - sp_estimate_data_compression_savings
      - sp_set_session_context
      - sp_describe_first_result_set
      - sp_describe_undeclared_parameters
      - sp_msforeachtable
      - sp_msforeachdb

  msdb_procs:
    description: SQL Agent / job / backup-history procedures (msdb-scoped)
    databases: [msdb]
    names:
      - sp_add_job
      - sp_add_jobstep
      - sp_add_jobschedule
      - sp_add_schedule
      - sp_start_job
      - sp_stop_job
      - sp_delete_job
      - sp_help_job
      - sp_help_jobstep
      - sp_help_jobschedule
      - sp_help_schedule
      - sp_helphistory

  dmv_dmf_patterns:
    description: Dynamic management views/functions (name patterns, LIKE-matched)
    databases: [master, msdb, sandbox]
    name_patterns:
      - "dm_exec_%"
      - "dm_os_%"
      - "dm_db_%"
      - "dm_tran_%"
      - "dm_io_%"
      - "dm_resource_governor_%"

  catalog_views_patterns:
    description: sys.* catalog views and metadata functions
    databases: [master, msdb, sandbox]
    name_patterns:
      - "objects"
      - "all_objects"
      - "system_objects"
      - "procedures"
      - "parameters"
      - "all_parameters"
      - "system_parameters"
      - "columns"
      - "tables"
      - "views"
      - "types"
      - "schemas"
      - "databases"
      - "indexes"
      - "index_columns"
      - "foreign_keys"
      - "check_constraints"
      - "sql_modules"
      - "triggers"
      - "server_principals"
      - "database_principals"
      - "extended_properties"

  information_schema_views:
    description: ANSI-standard INFORMATION_SCHEMA views
    databases: [master, msdb, sandbox]
    names:
      - TABLES
      - COLUMNS
      - VIEWS
      - ROUTINES
      - PARAMETERS
      - KEY_COLUMN_USAGE
      - TABLE_CONSTRAINTS
      - REFERENTIAL_CONSTRAINTS
      - CHECK_CONSTRAINTS
      - SCHEMATA

excluded:
  description: Explicitly out of scope for this pass (see README limitations)
  reasons:
    xp_extended_procs: "Compiled DLLs with no queryable parameter/result metadata (e.g. xp_cmdshell, xp_readerrorlog)."
    internal_system_base_tables: "Undocumented internal tables (sys.sysobjects-era base tables) not intended for direct use; catalog views are the supported surface."
