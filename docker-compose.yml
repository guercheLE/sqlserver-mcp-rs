services:
  sqlserver-mcp:
    build: .
    image: sqlserver-mcp:latest
    command: ["start"]
    env_file:
      - .env
    volumes:
      - ~/.sqlserver-mcp:/root/.sqlserver-mcp
    stdin_open: true
    tty: true

  sqlserver-mcp-http:
    build: .
    image: sqlserver-mcp:latest
    command: ["http", "--host", "0.0.0.0", "--port", "3000"]
    env_file:
      - .env
    environment:
      SQLSERVER_TRANSPORT: http
      SQLSERVER_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ~/.sqlserver-mcp:/root/.sqlserver-mcp
