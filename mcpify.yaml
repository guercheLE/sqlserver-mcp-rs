language: rust
output: .
force: true
publish_registry: false
publication:
  license: MIT
  repository: null
  readme: README.md
  authors: []
  keywords: []
  categories: []
  exclude:
  - /.github
  - /.mcpify
  - /docs
  - /scripts
  - /openapi
  - /Dockerfile
  - /docker-compose.yml
  - /.dockerignore
  - /.env.example
  - /mcpify.yaml
default_headers: {}
auth: []
