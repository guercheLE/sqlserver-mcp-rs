- version: '2019'
  source: docs/sqlserver-eda-openapi-pipeline/openapi/2019/combined.yaml
  default: false
  preprocess: []
- version: '2017'
  source: docs/sqlserver-eda-openapi-pipeline/openapi/2017/combined.yaml
  default: false
  preprocess: []
version_policy:
  mode: all
package_size_limit_mb: 100
